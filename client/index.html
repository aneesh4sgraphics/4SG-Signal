<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Signal - Sales Intelligence</title>
    
    <!-- Prevent search engine indexing -->
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex, notranslate">
    <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
    <meta name="bingbot" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="mask-icon" href="/favicon.svg" color="#111111">
    <meta name="theme-color" content="#111111">
    
    <!-- Roboto font - primary font for Notion-style UI -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Lobster for graffiti brand styling (kept for brand elements) -->
    <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Suppress harmless browser warnings before any other scripts load
      window.addEventListener('error', function(e) {
        if (e.message && (e.message.includes('ResizeObserver') || e.message.includes('loop'))) {
          e.stopImmediatePropagation();
          e.preventDefault();
          return false;
        }
      }, true);
      window.addEventListener('unhandledrejection', function(e) {
        var r = e.reason;
        if (r === undefined || r === null) { e.preventDefault(); return; }
        if (typeof r === 'string' && (r.includes('ResizeObserver') || r.includes('loop'))) { e.preventDefault(); return; }
        if (r && r.message && (r.message.includes('ResizeObserver') || r.message.includes('loop'))) { e.preventDefault(); return; }
      }, true);
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <!-- This is a replit script which adds a banner on the top of the page when opened in development mode outside the replit environment -->
    <script type="text/javascript" src="https://replit.com/public/js/replit-dev-banner.js"></script>
  </body>
</html>
